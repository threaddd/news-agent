version: '3.8'

services:
  news-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news-agent
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CODEBUDDY_API_KEY=${CODEBUDDY_API_KEY}
      - HUNYUAN_API_KEY=${HUNYUAN_API_KEY}
    volumes:
      - ./data:/app/data
      - ./dist:/app/dist:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
